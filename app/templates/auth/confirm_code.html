<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Подтверждение кода</title>
    <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🧑‍💻</text>
        </svg>">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/confirm.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div id="flash-data" style="display:none;">
        {{ get_flashed_messages(with_categories=true) | tojson }}
    </div>

    <div class="min-h-screen flex items-center justify-center">
        <div class="auth-box">
            <h1>Подтверждение</h1>
            <p class="subtitle">
                Введите 6-значный код, отправленный на <strong>{{ email }}</strong>
            </p>

            <form method="POST">
                <div class="form-group">
                    <label for="code">Код</label>
                    <input type="text" name="code" id="code" maxlength="6" inputmode="numeric" placeholder="123456"
                        required autofocus>
                </div>

                <button type="submit" class="btn-submit">
                    Подтвердить
                </button>
            </form>

            <p class="switch">
                Не пришёл код?
                <a href="{{ url_for('auth.register') }}">Попробовать заново</a>
            </p>
        </div>
    </div>

    <script src="/static/js/flash.js"></script>
    {% include 'components/footer.html' %}
</body>

</html>
