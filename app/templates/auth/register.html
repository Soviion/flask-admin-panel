<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Админ-панель УИВР</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div id="flash-data" style="display:none;">
        {{ get_flashed_messages(with_categories=true) | tojson }}
    </div>

    <div class="min-h-screen flex items-center justify-center bg-gray-50">
        <div class="auth-box bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Регистрация</h1>
            <p class="subtitle text-center text-gray-500 mb-8">Создайте аккаунт администратора</p>

            <form method="POST">
                <!-- Email -->
                <div class="form-group mb-6">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" name="email" id="email" value="{{ request.form.email or '' }}" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="example@email.com" required>
                </div>

                <!-- ФИО -->
                <div class="form-group mb-6">
                    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">ФИО</label>
                    <input type="text" name="full_name" id="full_name" value="{{ request.form.full_name or '' }}" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="Иванов Иван Иванович" required>
                </div>

                <!-- Пароль -->
                <div class="form-group mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
                    <input type="password" name="password" id="password" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="••••••••" required>
                </div>

                <!-- Повторите пароль -->
                <div class="form-group mb-8">
                    <label for="password2" class="block text-sm font-medium text-gray-700 mb-2">Повторите пароль</label>
                    <input type="password" name="password2" id="password2" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white py-3.5 rounded-xl font-semibold hover:from-emerald-700 hover:to-teal-700 transition shadow-md">
                    Зарегистрироваться
                </button>
            </form>

            <p class="switch text-center mt-6 text-gray-600">
                Уже есть аккаунт? 
                <a href="{{ url_for('auth.login') }}" class="text-indigo-600 font-medium hover:underline">Войти</a>
            </p>
        </div>
    </div>

    {% include 'components/footer.html' %}
</body>
</html>
