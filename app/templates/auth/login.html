<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Вход</title>
    <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🧑‍💻</text>
        </svg>">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/login.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div id="flash-data" style="display:none;">
        {{ get_flashed_messages(with_categories=true) | tojson }}
    </div>

    {% if errors %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6 max-w-md mx-auto text-center">
        {% for error in errors %}
        <p>{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <div class="min-h-screen flex items-center justify-center">
        <div class="auth-box">
            <h1>Вход</h1>
            <p class="subtitle">Войдите в админ-панель</p>

            <form method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" value="{{ email or '' }}"
                        placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">
                    Войти
                </button>
            </form>

            <p class="switch">
                Нет аккаунта?
                <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <script src="/static/js/flash.js"></script>
    {% include 'components/footer.html' %}
</body>

</html>
