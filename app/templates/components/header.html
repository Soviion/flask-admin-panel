<header class="bg-gray-900/90 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50 shadow-lg">
    <style>
        header {
            background: linear-gradient(to bottom, rgba(17, 24, 39, 0.92), rgba(17, 24, 39, 0.85)) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-bottom: 1px solid rgba(52, 211, 153, 0.25) !important; /* лёгкий зелёный оттенок линии */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6) !important;
        }

        header .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f3f4f6;
            margin: 0;
            letter-spacing: -0.025em;
        }

        header h1 span {
            background: linear-gradient(to right, #34d399, #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .nav-links {
            display: flex;
            align-items: center;
            gap: 1.75rem;
        }

        header .nav-link {
            font-size: 0.95rem;
            font-weight: 500;
            color: #9ca3af;
            transition: all 0.2s ease;
            text-decoration: none;
            position: relative;
        }

        header .nav-link:hover {
            color: #34d399;
        }

        header .nav-link.active {
            color: #34d399;
            font-weight: 600;
        }

        header .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: #34d399;
            transition: width 0.3s ease;
        }

        header .nav-link:hover::after,
        header .nav-link.active::after {
            width: 100%;
        }

        header .logout-link {
            color: #f87171;
        }

        header .logout-link:hover {
            color: #fca5a5;
        }

        @media (max-width: 768px) {
            header .container {
                padding: 0.75rem 1rem;
            }

            header h1 {
                font-size: 1.25rem;
            }

            header .nav-links {
                gap: 1rem;
            }

            header .nav-link {
                font-size: 0.875rem;
            }
        }
    </style>

    <div class="container">
        <div>
            {% if is_dashboard %}
                <h1>
                    Админ-панель
                </h1>
            {% elif is_students %}
                <h1>
                    База студентов
                </h1>
            {% endif %}
        </div>

        <div class="nav-links">
            {% if not is_dashboard %}
                <a href="{{ url_for('dashboard.index') }}" class="nav-link">
                    Главная
                </a>
            {% endif %}
            <a href="{{ url_for('auth.logout') }}" class="nav-link logout-link">
                Выйти
            </a>
            <!-- шестерня редактирования профиля -->
            <a href="{{ url_for('auth.logout') }}" class="nav-link logout-link">
                ⚙
            </a>
        </div>
    </div>
</header>
