<header class="bg-gray-900/80 backdrop-blur-sm border-b border-gray-800 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        
        <!-- Левая часть -->
        <div>
            {% if is_dashboard %}
                <h1 class="text-3xl font-bold text-white">
                    Добро пожаловать,
                    <span class="text-indigo-400">
                        {{ current_user.full_name or current_user.email }}
                    </span>!
                </h1>
            {% else %}
                <h1 class="text-2xl font-semibold text-white">
                    {{ title or "Админ-панель" }}
                </h1>
            {% endif %}
        </div>

        <!-- Правая часть -->
        <div class="flex items-center space-x-6">

            {% if not is_dashboard %}
                <a href="{{ url_for('dashboard.index') }}"
                   class="text-sm font-medium text-indigo-400 hover:text-indigo-300 transition">
                    Главная
                </a>
            {% endif %}

            <a href="{{ url_for('auth.logout') }}"
               class="text-sm font-medium text-red-400 hover:text-red-300 transition">
                Выйти
            </a>

        </div>
    </div>
</header>
